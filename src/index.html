<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tidy</title>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
      <button id="addTask">Add task</button>
      <button id="addProject">Add project</button>
      <div class="projects">
        <h3>My Projects</h3>
      </div>
    </div>
    

    <dialog id="myDialog">
      <form id="myForm" method="dialog">
        <label>
          Title:
          <input type="text" name="title" id="title" required />
        </label>

        <label>
          Description:
          <input type="text" name="description" id="description" required />
        </label>

        <label for="projectSelect">Choose project:</label>
        <select id="projectSelect">
          <option value="">Choose a Project</option>
        </select>


        <button type="button" value="cancel" id="close" formnovalidate>
          Cancel
        </button>
        <button type="submit" value="submit" id="submit">Submit</button>
      </form>
    </dialog>

    <dialog id="projectDialog">
      <form id="projectForm" method="dialog">
        <label>
          Name:
          <input type="text" name="name" id="name" required />
        </label>

        <button type="button" value="cancel" id="closeProject" formnovalidate>
          Cancel
        </button>
        <button type="submit" value="submit" id="submit">Submit</button>
      </form>
    </dialog>

    <div id="mainContent">
    </div>
    </div>
  </body>
</html>
