<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>todo list</title>
  </head>
  <body>
    <div class="sidebar">
      <button id="addTask">Add task</button>
      <div class="projects">
        <h3>My Projects</h3>
      </div>
    </div>

    <dialog id="myDialog">
      <form id="myForm" method="dialog">
        <label>
          Title:
          <input type="text" name="title" id="title" required />
        </label>

        <label>
          Description:
          <input type="text" name="title" id="description" required />
        </label>

        <button type="button" value="cancel" id="close" formnovalidate>
          Cancel
        </button>
        <button type="submit" value="submit" id="submit">Submit</button>
      </form>
    </dialog>

    <div id="mainContent">
    </div>
  </body>
</html>
